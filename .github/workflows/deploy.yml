name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/collability-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/collability-web

jobs:
  build-and-deploy:
    name: Build images and deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/collability_ec2
          chmod 600 ~/.ssh/collability_ec2
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/collability_ec2 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd '${{ secrets.EC2_APP_DIR }}' && \
             git fetch origin main && \
             git checkout main && \
             git pull --ff-only origin main && \
             chmod +x scripts/deploy-ec2.sh && \
             WEB_IMAGE='${{ env.WEB_IMAGE }}:${{ github.sha }}' \
             API_IMAGE='${{ env.API_IMAGE }}:${{ github.sha }}' \
             ./scripts/deploy-ec2.sh"
